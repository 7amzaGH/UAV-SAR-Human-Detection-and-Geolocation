# =============================================================
#  UAV Human Detection & Geolocation — Configuration
#
#  Copy this file to config.yaml and fill in your credentials.
#  config.yaml is in .gitignore — never commit real passwords.
#
#  Drone position (lat/lon/altitude/heading) is NOT here:
#    main_local.py → read per-frame from DJI .SRT telemetry file
#    main_live.py  → read in real-time from flight controller via serial
# =============================================================

# ── Model ─────────────────────────────────────────────────────
model:
  weights:              "models/best.pt"
  confidence_threshold: 0.6      # 0.6 suppresses false positives while
  device:               "cuda"   # preserving recall on real detections
                                  # use "cpu" if no GPU available

# ── Camera (DJI Air 3S) ───────────────────────────────────────
# FOV values derived from 84° diagonal spec for 16:9 sensor
camera:
  fov_h:        76      # horizontal field of view in degrees
  fov_v:        49      # vertical field of view in degrees
  image_width:  1920
  image_height: 1080

# ── GPS Serial (main_live.py only) ────────────────────────────
# Find your port on Jetson Nano with: ls /dev/ttyTHS*
gps:
  port:     "/dev/ttyTHS1"
  baudrate: 9600

# ── Email Alert ───────────────────────────────────────────────
# Gmail App Password: myaccount.google.com/apppasswords
# Requires 2FA enabled on your Gmail account
alert:
  recipient_email: "rescue@example.com"
  sender_email:    "your_email@gmail.com"
  sender_password: "your_app_password"
  smtp_host:       "smtp.gmail.com"
  smtp_port:       465
